<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出租车GPS数据服务平台</title>
    <!-- 引入外部CSS -->
    <link rel="stylesheet" href="/map-test/style.css">
    <!-- 引入jQuery (用于后续Ajax请求) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 引入Bootstrap 5 CSS (用于快速美化界面，文档中提及了`btn btn-primary`样式) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入百度地图API GL版 -->
    <!-- GL版需要添加 type=webgl 参数 -->
    <script src="https://api.map.baidu.com/api?type=webgl&v=1.0&ak=nDVE6TfyIhy4WzKjDHeuA3VhubdNYqOL"></script>
</head>
<body>
    <div class="container-fluid">
        <!-- 主标题 -->
        <header class="header text-center py-4">
            <h1>出租车(济南)GPS数据服务平台</h1>
        </header>

        <div class="main-content">
            <!-- 左侧功能区 -->
            <div class="left-panel">
                <!-- UTC时间查询 -->
                <section class="function-card">
                    <h4>UTC时间查询</h4>
                    <p>点击下方按钮，可跳转至在线时间戳转换工具页面进行UTC时间与北京时间的相互转换。</p>
                    <form id="utcForm" action="/relay1/" method="get" target="_blank">
                        <input type="submit" value="点击进行UTC时间查询" class="btn btn-primary w-100">
                    </form>
                </section>

                <!-- 按时间查询 -->
                <section class="function-card">
                    <h4>按时间查询</h4>
                    <p>查询在特定时间段内，所有出租车的GPS位置分布。</p>
                    <form id="timeQueryForm" onsubmit="return handleTimeQuery(event)">
                        <div class="mb-3">
                            <label for="startTime" class="form-label">开始时间 (UTC):</label>
                            <input type="datetime-local" class="form-control" id="startTime" name="startTime" required>
                        </div>
                        <div class="mb-3">
                            <label for="endTime" class="form-label">结束时间 (UTC):</label>
                            <input type="datetime-local" class="form-control" id="endTime" name="endTime" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">查询该时段车辆分布</button>
                    </form>
                </section>

                <!-- 按车辆查询 -->
                <section class="function-card">
                    <h4>按车辆查询</h4>
                    <p>输入车牌号和起止时间，查询特定车辆在该时段内的运行轨迹。</p>
                    <form id="carQueryForm" onsubmit="return handleCarQuery(event)">
                        <div class="mb-3">
                            <label for="carId" class="form-label">车牌标识号:</label>
                            <input type="text" class="form-control" id="carId" name="carId" placeholder="例如: 15053119982" required>
                        </div>
                        <div class="mb-3">
                            <label for="carStartTime" class="form-label">开始时间 (UTC):</label>
                            <input type="datetime-local" class="form-control" id="carStartTime" name="carStartTime" required>
                        </div>
                        <div class="mb-3">
                            <label for="carEndTime" class="form-label">结束时间 (UTC):</label>
                            <input type="datetime-local" class="form-control" id="carEndTime" name="carEndTime" required>
                        </div>
                        <button type="submit" class="btn btn-info w-100">查询车辆轨迹</button>
                    </form>
                </section>

                <!-- 数据分析入口 -->
                <section class="function-card">
                    <h4>数据分析与可视化</h4>
                    <p>点击下方按钮，进入数据分析界面，查看各类数据挖掘结果的可视化图表。</p>
                    <!-- 注意：此处action的URL需与Django项目的urls.py中配置的路由一致 -->
                    <form id="analysisForm" action="/relay4/" method="get" target="_blank">
                        <input type="submit" value="点击进入数据分析界面" class="btn btn-warning w-100">
                    </form>
                </section>
            </div>

            <!-- 右侧地图展示区 -->
            <div class="right-panel">
                <div class="map-container">
                    <h4 id="map-title">济南市出租车GPS数据地图</h4>
                    <!-- 百度地图容器 -->
                    <div id="map-container" style="width:100%; height:100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入Bootstrap JS (可选，用于某些组件) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入我们自己的JS文件 -->
    <script src="/map-test/script.js"></script>
</body>
</html>
